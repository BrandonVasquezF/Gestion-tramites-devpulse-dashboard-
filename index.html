<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>gestion-tramites</title>
  </head>
  <body class="bg-brand-50 text-slate-900 min-h-screen p-4 md:p-8 font-sans antialiased transition-colors duration-500 dark:bg-slate-950 dark:text-slate-100">

    <header class="flex flex-col md:flex-row justify-between items-center border-b border-slate-700 pb-6 mb-8 gap-4">
    <h1 class="text-3xl font-black text-slate-900 dark:text-white tracking-tight text-center md:text-left">Gestión <span class="text-brand-500">Trámites</span></h1>
    <nav>
        <ul class="flex gap-4 md:gap-6 items-center">
            <li>
                <a href="#" class="flex items-center gap-2 text-slate-600 dark:text-slate-400 hover:text-brand-500 dark:hover:text-brand-400 font-medium hover:bg-brand-50 dark:hover:bg-slate-800 px-3 py-2 rounded-lg transition-colors active:scale-95" aria-label="Ir a la página de inicio">
                    <i data-lucide="home" class="w-4 h-4"></i>
                    <span>Inicio</span>
                </a>
            </li>
            <li>
                <a href="#" class="flex items-center gap-2 text-slate-600 dark:text-slate-400 hover:text-brand-500 dark:hover:text-brand-400 font-medium hover:bg-brand-50 dark:hover:bg-slate-800 px-3 py-2 rounded-lg transition-colors active:scale-95" aria-label="Ver mis proyectos de trámites">
                    <i data-lucide="briefcase" class="w-4 h-4"></i>
                    <span>Proyectos</span>
                </a>
            </li>
            <li>
                <a href="#" class="flex items-center gap-2 text-slate-600 dark:text-slate-400 hover:text-brand-500 dark:hover:text-brand-400 font-medium hover:bg-brand-50 dark:hover:bg-slate-800 px-3 py-2 rounded-lg transition-colors active:scale-95" aria-label="Ver mi perfil de usuario">
                    <i data-lucide="user" class="w-4 h-4"></i>
                    <span>Perfil</span>
                </a>
            </li>
        </ul>
    </nav>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start max-w-7xl mx-auto px-4 py-8">
    
    <div class="col-span-1 lg:col-span-9 space-y-8 order-2 lg:order-1">
        
        <section class="space-y-4">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="relative flex-1 group">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-500 transition-colors">
                        <i data-lucide="search" class="w-5 h-5"></i>
                    </span>
                    <input id="search-input" 
                        type="text" 
                        placeholder="Buscar trámite por nombre..." 
                        class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 bg-white dark:bg-slate-900 dark:border-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-slate-900 dark:text-white shadow-sm"
                    >
                </div>

                <button id="btn-nuevo-tramite" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl transition-all active:scale-95 flex items-center justify-center gap-3 shadow-lg shadow-blue-500/20 whitespace-nowrap">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    Nuevo Trámite
                </button>
            </div>
        </section>

        <section class="space-y-6">
            <h2 class="text-xl md:text-2xl font-bold text-slate-800 dark:text-white">Mis trámites</h2>
            
            <div id="contenedor-tramites" class="grid gap-4">
                </div>

            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 text-center animate-fade-in-up">
                <div class="bg-slate-100 dark:bg-slate-800 w-20 h-20 flex items-center justify-center rounded-full mb-6">
                    <i data-lucide="archive-x" class="w-10 h-10 text-slate-400"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">No hay trámites aquí</h3>
                <p class="text-slate-500 dark:text-slate-400 max-w-xs mx-auto">Parece que tu bandeja está limpia.</p>
            </div>
        </section>
    </div>

    <aside class="col-span-1 lg:col-span-3 sticky top-8 h-fit order-1 lg:order-2">
        <div class="bg-white dark:bg-slate-900 p-5 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm">
            <h2 class="flex items-center gap-2 font-bold text-slate-900 dark:text-white mb-4 text-lg">
                <i data-lucide="bell" class="w-4 h-4 text-blue-500 animate-bounce"></i> Recordatorios
            </h2>

            <ul class="text-sm text-slate-500 dark:text-slate-400 space-y-1">
                <li id="filtro-todos" class="flex items-center gap-2 hover:bg-blue-50 dark:hover:bg-blue-900/20 hover:text-blue-600 p-2 rounded-lg cursor-pointer transition-all active:scale-95">
                    <i data-lucide="layers" class="w-4 h-4"></i> Todos los trámites
                </li>
                <li id="filtro-pendientes" class="flex items-center gap-2 hover:bg-blue-50 dark:hover:bg-blue-900/20 hover:text-blue-600 p-2 rounded-lg cursor-pointer transition-all active:scale-95">
                    <i data-lucide="clock" class="w-4 h-4"></i> Pendientes
                </li>
                <li id="filtro-finalizados" class="flex items-center gap-2 hover:bg-blue-50 dark:hover:bg-blue-900/20 hover:text-blue-600 p-2 rounded-lg cursor-pointer transition-all active:scale-95">
                    <i data-lucide="check-circle-2" class="w-4 h-4"></i> Finalizados
                </li>
            </ul> 
        </div>
    </aside>
</main>

<div id="modal-tramite" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-800 animate-in zoom-in-95 duration-200">
        <div class="p-6">
            <h2 class="text-xl font-bold text-slate-900 dark:text-white mb-4">Nuevo Trámite</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Nombre del trámite</label>
                    <input type="text" id="modal-input-nombre" placeholder="Ej: Pago de recibo" class="w-full px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div class="flex items-center gap-3 p-3 bg-slate-50 dark:bg-slate-800 rounded-lg">
                    <input type="checkbox" id="modal-input-urgente" class="w-4 h-4 text-blue-600 rounded">
                    <label for="modal-input-urgente" class="text-sm font-medium text-slate-700 dark:text-slate-300 italic">¿Es un trámite urgente?</label>
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button id="btn-modal-cancelar" class="flex-1 px-4 py-2 rounded-lg text-slate-600 dark:text-slate-400 font-medium hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">Cancelar</button>
                <button id="btn-modal-guardar" class="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-lg shadow-blue-500/30 transition-all">Guardar</button>
            </div>
        </div>
    </div>
</div>

<footer class="mt-12 py-8 border-t border-slate-100 dark:border-slate-800 text-slate-500 text-sm text-center">
    <p>&copy; 2026 - Brandon Vásquez | Univalle</p>
</footer>
    <script type="module" src="/src/main.ts"></script>

  </body>
</html>
